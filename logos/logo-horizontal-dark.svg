<svg width="480" height="100" viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="100" fill="#1A1A1A"/>
  <!-- Arch Mark -->
  <g transform="translate(20, 8)">
    <line x1="0" y1="78" x2="86" y2="78" stroke="#C9A96E" stroke-width="1.8"/>
    <path d="M 10 78 L 10 44 A 33 33 0 0 1 76 44 L 76 78" stroke="#C9A96E" stroke-width="2" fill="none" stroke-linecap="square"/>
    <path d="M 22 78 L 22 50 A 21 21 0 0 1 64 50 L 64 78" stroke="#C9A96E" stroke-width="1.2" fill="none" stroke-linecap="square"/>
    <polygon points="43,24 47.5,29 43,34 38.5,29" stroke="#C9A96E" stroke-width="1" fill="#C9A96E"/>
  </g>
  <!-- Divider -->
  <line x1="126" y1="14" x2="126" y2="86" stroke="rgba(249,247,244,0.12)" stroke-width="1"/>
  <!-- Gold accent rules flanking the monogram -->
  <line x1="156" y1="50" x2="200" y2="50" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <line x1="380" y1="50" x2="424" y2="50" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="290" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#F9F7F4" letter-spacing="18">SGA</text>
  <text x="290" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="300" fill="#F9F7F4" letter-spacing="8" opacity="0.6">ARCHITECTS</text>
  <text x="290" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="200" fill="#C9A96E" letter-spacing="4.5">EST. 1996  ·  PAN INDIA</text>
</svg>
